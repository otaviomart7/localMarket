<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="round">
            <img class="logo" src="../../public/desenho-de-uma-garrafa-plastica-de-agua_29937-11160.avif" alt="Logo" width="200px">
        </div>

        <h1>Faça seu Login:</h1>


        <div class="wrap-input-label">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Insira o usuário">
        </div>
        
        <div class="wrap-input-label">
            <label for="senha">Senha</label>
            <input type="password" id="senha" placeholder="Insira sua senha">
            <div onclick="showPassword()">
                <img src="../../public/view.png" alt="" class="eye" id="eye" width="25px">
            </div>
        </div>

        
        <button class="btn-login" onclick="login()">Login</button>

    </div>

    <div class="error-div" id="errorModal">
        <h3>Credenciais Incorretas!</h3>
        <button onclick="fecharError()">❌</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
